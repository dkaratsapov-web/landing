<script>
(function(){
  var overlay=document.getElementById('preloader');
  var stage=document.getElementById('pl-stage');
  var plane=document.getElementById('pl-plane');
  var trail=document.getElementById('pl-trailline');
  var grad=document.getElementById('pl-trail');
  if(!overlay||!plane) return;
  document.body.style.overflow='hidden';
  var reduce=window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var W=innerWidth,H=innerHeight;
  function size(){W=innerWidth;H=innerHeight;stage.setAttribute('viewBox','0 0 '+W+' '+H);}
  size(); window.addEventListener('resize',size);
  var BASE=0.5;
  var T_LOOP=3600, T_ZOOM=1000, T_FADE=500;
  function easeIO(t){return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;}
  function loopPos(t){
    var e=easeIO(t);
    var dx=(0.96-0.46*e)*W;
    var dy=(1.12-0.64*e)*H;
    var amp=0.23*H*Math.sin(Math.PI*t);
    var ang=2*Math.PI*2*t-Math.PI/2;
    return {x:dx+amp*Math.cos(ang)*1.15, y:dy+amp*Math.sin(ang)};
  }
  function finish(){
    overlay.style.opacity='0';overlay.style.pointerEvents='none';document.body.style.overflow='';
    setTimeout(function(){overlay.parentNode&&overlay.parentNode.removeChild(overlay);},T_FADE);
  }
  if(reduce){finish();return;}
  var pts=[],MAXP=26,t0=null,lastHeading=0;
  function draw(x,y,deg,sc){
    plane.setAttribute('transform','translate('+x+' '+y+') rotate('+deg+') scale('+sc+')');
  }
  function pushTrail(x,y){
    pts.push(x+','+y); if(pts.length>MAXP)pts.shift();
    trail.setAttribute('points',pts.join(' '));
    var a=pts[0].split(','),b=pts[pts.length-1].split(',');
    grad.setAttribute('x1',a[0]);grad.setAttribute('y1',a[1]);
    grad.setAttribute('x2',b[0]);grad.setAttribute('y2',b[1]);
  }
  function frame(ts){
    if(t0===null)t0=ts;
    var el=ts-t0;
    if(el<=T_LOOP){
      var t=el/T_LOOP;
      var p=loopPos(t),p2=loopPos(Math.min(1,t+0.004));
      var heading=Math.atan2(p2.y-p.y,p2.x-p.x)*180/Math.PI; // nose follows velocity
      lastHeading=heading;
      var sc=BASE*(1+0.05*Math.sin(2*Math.PI*2*t));
      pushTrail(p.x,p.y); draw(p.x,p.y,heading,sc);
      requestAnimationFrame(frame);
    } else if(el<=T_LOOP+T_ZOOM){
      var z=(el-T_LOOP)/T_ZOOM,ez=z*z;
      var end=loopPos(1);
      var cx=end.x+(W/2-end.x)*z, cy=end.y+(H/2-end.y)*z;
      draw(cx,cy,lastHeading,BASE*(1+26*ez));
      trail.style.opacity=String(1-z);
      if(z>0.6)overlay.style.opacity=String(1-(z-0.6)/0.4);
      requestAnimationFrame(frame);
    } else { finish(); }
  }
  var s=loopPos(0); draw(s.x,s.y,0,BASE);
  requestAnimationFrame(frame);
})();
</script>
